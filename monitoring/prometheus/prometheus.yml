global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: doc-service-api
    static_configs:
      - targets: ['api:3000']
    metrics_path: /metrics

  - job_name: doc-service-worker
    static_configs:
      - targets: ['worker:3000']
    metrics_path: /metrics

  - job_name: inference-service
    static_configs:
      - targets: ['inference:8000']
    metrics_path: /metrics
