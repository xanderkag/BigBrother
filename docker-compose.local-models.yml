# Опциональный compose-профиль для локальных моделей через Ollama.
#
# Зачем: parsdocs может работать с любым OpenAI-API-совместимым сервером,
# но самый простой путь для dev-стенда и demo — Ollama. Эта compose-файл
# поднимает Ollama рядом с inference-service в той же сети `ai-platform`,
# одноразово пуллит указанные модели, после чего inference-service ходит
# к нему как к OpenAI API.
#
# Сценарий:
#   1. `docker network create ai-platform` (если ещё нет)
#   2. `docker compose -f docker-compose.doc-platform.yml -f docker-compose.local-models.yml up -d`
#   3. В `inference-service/.env`:
#        BACKEND=openai_compat
#        OPENAI_BASE_URL=http://ollama:11434/v1
#        OPENAI_MODEL=qwen2.5vl:7b
#        OPENAI_API_KEY=         # не нужен
#      → перезапустить контейнер inference: `docker compose ... restart inference`
#
# Замена модели:
#   docker compose -f docker-compose.local-models.yml exec ollama \
#       ollama pull llama3.2-vision:11b
#   # затем меняем OPENAI_MODEL в .env и рестартуем inference
#
# GPU passthrough (NVIDIA):
#   Раскомментируйте `deploy.resources.reservations` ниже и подними с
#   `--profile gpu` (потребует NVIDIA Container Toolkit).
#
# Apple Silicon / CPU:
#   Ничего не нужно — Ollama сам выберет Metal/CPU. Скорость скромная,
#   но 7B/11B модели работают.

services:
  # --- Ollama: OpenAI-совместимый локальный inference-сервер ---
  ollama:
    image: ollama/ollama:latest
    container_name: parsdocs-ollama
    restart: unless-stopped
    ports:
      # Экспозим на хост для удобства локальной отладки. В production
      # лучше убрать — inference ходит к нему по внутренней сети.
      - "11434:11434"
    volumes:
      # Веса моделей кэшируются здесь. Может разрастись на десятки GB.
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - ai-platform
    # --- GPU passthrough (NVIDIA). Раскомментируйте при наличии. ---
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # --- Bootstrap: одноразово скачивает модели из OLLAMA_PULL ---
  # Зачем отдельный сервис: `ollama pull` блокирующий, нельзя совмещать с
  # `ollama serve` в одном CMD. Этот контейнер дожидается готовности
  # основного, тянет список моделей через REST API, и завершается.
  ollama-bootstrap:
    image: curlimages/curl:8.10.1
    container_name: parsdocs-ollama-bootstrap
    depends_on:
      ollama:
        condition: service_healthy
    # Список моделей через запятую. Меняйте по нужде; популярные:
    #   qwen2.5vl:7b              ~6 GB, Qwen2.5 VL — хорошо на русском
    #   llama3.2-vision:11b       ~8 GB, Llama 3.2 Vision
    #   minicpm-v:8b              ~5 GB, очень шустрый на русском
    #   gemma3:4b                 ~3 GB, без vision но компактно
    environment:
      OLLAMA_PULL: "${OLLAMA_PULL:-qwen2.5vl:7b}"
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Pulling models: $$OLLAMA_PULL"
        IFS=',' && for model in $$OLLAMA_PULL; do
          echo "→ $$model"
          # Streaming pull через REST API
          curl -fsS http://ollama:11434/api/pull \
            -H 'Content-Type: application/json' \
            -d "{\"model\":\"$$model\",\"stream\":false}" || \
            echo "warn: failed to pull $$model (продолжаем)"
        done
        echo "Bootstrap done."
    networks:
      - ai-platform
    restart: "no"

volumes:
  ollama-data:
    name: parsdocs-ollama-data

networks:
  ai-platform:
    name: ai-platform
    external: true
