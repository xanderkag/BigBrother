<!DOCTYPE html>
<html lang="ru" class="">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>parsdocs</title>
  <!-- Inline SVG favicon — индиго-документ с уголком. Без отдельного файла. -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%234f46e5'><path d='M5.625 1.5c-1.036 0-1.875.84-1.875 1.875v17.25c0 1.035.84 1.875 1.875 1.875h12.75c1.035 0 1.875-.84 1.875-1.875V12.75A3.75 3.75 0 0 0 16.5 9h-1.875a1.875 1.875 0 0 1-1.875-1.875V5.25A3.75 3.75 0 0 0 9 1.5H5.625Z'/><path d='M12.971 1.816A5.23 5.23 0 0 1 14.25 5.25v1.875c0 .207.168.375.375.375H16.5a5.23 5.23 0 0 1 3.434 1.279 9.768 9.768 0 0 0-6.963-6.963Z'/></svg>" />

  <!-- Inter (UI) + JetBrains Mono (значения, JSON) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Tailwind v3 Play CDN — JIT в браузере. Без build-шага; вернёмся к
       precompiled CSS когда придёт время оптимизировать вес страницы. -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        fontFamily: {
          sans: ['Inter', 'system-ui', '-apple-system', 'Segoe UI', 'sans-serif'],
          mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
        },
      },
    };
  </script>

  <!-- Alpine.js для маленьких локальных состояний (modals, dropdowns). -->
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>

  <!--
    Design tokens — единый набор классов для всех views.

    Любые ad-hoc стили в app.js теряют дисциплину и расползаются: разные
    padding'и у карточек, разные размеры кнопок, разный отступ от
    заголовка. Чтобы этого не было — определяем все «строительные блоки»
    здесь, в views используем только их + локальные mods.

    Цветовая шкала: slate-50/950 фон, white/slate-900 поверхности,
    slate-200/800 границы, indigo акцент, emerald/amber/rose/sky для
    статусов и валидации.

    КРИТИЧНО: атрибут type="text/tailwindcss" обязателен для Play CDN,
    иначе директивы @apply не компилируются, и весь токен-набор
    (`.card`, `.btn-primary`, `.badge-emerald`, ...) превращается в
    мёртвый текст — DOM показывает голые элементы без стилей.
  -->
  <style type="text/tailwindcss">
    /* === LAYOUT ============================================== */

    /* Контейнер страницы — единые внешние отступы и максимальная ширина */
    .page              { @apply p-8 max-w-6xl mx-auto; }
    .page-narrow       { @apply p-8 max-w-4xl mx-auto; }

    /* Заголовок страницы: title + subtitle + опциональный actions-блок */
    .page-header       { @apply flex items-start justify-between gap-4 mb-6; }
    .page-title        { @apply text-2xl font-semibold tracking-tight; }
    .page-subtitle     { @apply text-sm text-slate-500 dark:text-slate-400 mt-1; }

    /* Ссылка "назад к списку" над заголовком */
    .back-link         { @apply inline-flex items-center gap-1 text-sm text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 transition mb-4; }

    /* === SURFACES (cards) ==================================== */

    .card              { @apply bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm; }
    .card-body         { @apply p-5; }
    .card-body-lg      { @apply p-6; }
    .card-header       { @apply px-5 py-3 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between gap-3; }
    .card-title        { @apply text-base font-semibold; }
    .card-section      { @apply p-5 border-t border-slate-200 dark:border-slate-800 first:border-t-0; }

    /* === BUTTONS ============================================= */
    /* hierarchy: primary (filled indigo) → secondary (outline) → ghost (бесшумная) */

    .btn               { @apply inline-flex items-center justify-center gap-2 font-medium transition disabled:opacity-50 disabled:cursor-not-allowed; }
    .btn-md            { @apply px-4 py-2 text-sm rounded-lg; }
    .btn-sm            { @apply px-3 py-1.5 text-xs rounded-md; }
    .btn-xs            { @apply px-2.5 py-1 text-xs rounded; }

    .btn-primary       { @apply btn bg-indigo-600 hover:bg-indigo-700 text-white; }
    .btn-secondary     { @apply btn border border-slate-300 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-200; }
    .btn-ghost         { @apply btn text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800; }
    .btn-danger        { @apply btn bg-rose-600 hover:bg-rose-700 text-white; }
    .btn-accent-outline { @apply btn border border-indigo-300 dark:border-indigo-700 text-indigo-700 dark:text-indigo-300 hover:bg-indigo-50 dark:hover:bg-indigo-950/50; }

    /* === FORM FIELDS ========================================= */

    .form-row          { @apply space-y-1.5; }
    .form-label        { @apply block text-sm font-medium text-slate-700 dark:text-slate-200; }
    .form-input,
    .form-select,
    .form-textarea     {
      @apply w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-sm text-slate-900 dark:text-slate-100 placeholder-slate-400;
      @apply focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500;
      @apply disabled:bg-slate-50 dark:disabled:bg-slate-900 disabled:cursor-not-allowed;
    }
    .form-textarea     { @apply font-mono; }
    .form-help         { @apply mt-1.5 text-xs text-slate-500 dark:text-slate-400; }
    .form-error        { @apply mt-1.5 text-sm text-rose-600 dark:text-rose-400; }

    /* === BADGES ============================================== */

    .badge             { @apply inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium; }
    .badge-slate       { @apply bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300; }
    .badge-indigo      { @apply bg-indigo-100 text-indigo-700 dark:bg-indigo-950 dark:text-indigo-300; }
    .badge-emerald     { @apply bg-emerald-100 text-emerald-700 dark:bg-emerald-950 dark:text-emerald-300; }
    .badge-amber       { @apply bg-amber-100 text-amber-800 dark:bg-amber-950 dark:text-amber-300; }
    .badge-rose        { @apply bg-rose-100 text-rose-700 dark:bg-rose-950 dark:text-rose-300; }
    .badge-sky         { @apply bg-sky-100 text-sky-700 dark:bg-sky-950 dark:text-sky-300; }
    .badge-violet      { @apply bg-violet-100 text-violet-700 dark:bg-violet-950 dark:text-violet-300; }
    .badge-pulse       { @apply animate-pulse; }

    /* === STATES ============================================== */

    .empty-state       { @apply p-12 text-center; }
    .empty-state-text  { @apply text-slate-500 dark:text-slate-400; }
    .empty-state-cta   { @apply inline-block mt-3 text-indigo-600 hover:text-indigo-700 text-sm font-medium; }

    .skeleton          { @apply bg-slate-200 dark:bg-slate-800 rounded animate-pulse; }
    .skeleton-row      { @apply h-4 skeleton; }

    .error-banner      { @apply p-4 rounded-lg bg-rose-50 dark:bg-rose-950/40 border border-rose-200 dark:border-rose-900 text-rose-700 dark:text-rose-300; }
    .warning-banner    { @apply p-3 rounded-lg bg-amber-50 dark:bg-amber-950/30 border border-amber-200 dark:border-amber-900 text-sm text-amber-800 dark:text-amber-300; }
    .info-banner       { @apply p-3 rounded-lg bg-sky-50 dark:bg-sky-950/30 border border-sky-200 dark:border-sky-900 text-sm text-sky-800 dark:text-sky-300; }

    /* === NAV ================================================= */

    .nav-link          { @apply flex items-center gap-2 px-3 py-2 rounded-md text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition; }
    .nav-link.active   { @apply bg-indigo-50 dark:bg-indigo-950/60 text-indigo-700 dark:text-indigo-300; }

    /* === DATA DISPLAY ======================================== */

    /* Таблицы: единые отступы и оформление header'а */
    .data-table        { @apply w-full; }
    .data-table thead  { @apply bg-slate-50 dark:bg-slate-950/50 text-xs uppercase tracking-wider text-slate-500 dark:text-slate-400; }
    .data-table th     { @apply text-left px-4 py-2.5 font-medium; }
    .data-table tbody  { @apply divide-y divide-slate-100 dark:divide-slate-800; }
    .data-table td     { @apply px-4 py-3 text-sm; }
    .data-table tr.row-clickable { @apply cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/50 transition; }

    /* Описание ключ/значение в карточке */
    .kv                { @apply space-y-1.5 text-sm; }
    .kv-row            { @apply flex justify-between items-center; }
    .kv-key            { @apply text-slate-500 dark:text-slate-400; }
    .kv-value          { @apply font-mono text-xs; }

    /* JSON tree node (см. рендер в app.js) */
    .json-node         { @apply font-mono text-xs leading-relaxed; }
    .json-key          { @apply text-indigo-700 dark:text-indigo-300; }
    .json-string       { @apply text-emerald-700 dark:text-emerald-300; }
    .json-number       { @apply text-violet-700 dark:text-violet-300; }
    .json-boolean      { @apply text-amber-700 dark:text-amber-300; }
    .json-null         { @apply text-slate-400 italic; }
    .json-toggle       { @apply cursor-pointer select-none text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 inline-block w-3 text-center; }
    .json-bracket      { @apply text-slate-500 dark:text-slate-400; }
    .json-indent       { @apply pl-4 border-l border-dashed border-slate-200 dark:border-slate-800; }

    /* === CHIPS (multi-value inputs) ========================= */
    /* Используется в editor'е document-type для expected_fields,
       validators, classification_keywords. Каждый элемент — chip с
       кнопкой удаления, под массивом строк — input для добавления. */

    .chip-input        { @apply flex flex-wrap gap-1.5 p-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 min-h-[2.5rem] focus-within:ring-2 focus-within:ring-indigo-500 focus-within:border-indigo-500; }
    .chip              { @apply inline-flex items-center gap-1 px-2 py-0.5 rounded-md bg-slate-100 dark:bg-slate-700 text-xs font-mono text-slate-700 dark:text-slate-200; }
    .chip-remove       { @apply text-slate-400 hover:text-rose-500 cursor-pointer text-base leading-none; }
    .chip-add-input    { @apply flex-1 min-w-[8rem] bg-transparent border-0 p-0.5 text-xs font-mono focus:outline-none focus:ring-0; }

    /* Code editor — для llm_schema (JSON) и llm_prompt (длинный текст) */
    .code-editor       { @apply w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-950 text-xs font-mono text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500; }

    /* Audit log diff highlighting */
    .audit-diff-row    { @apply grid grid-cols-[8rem_1fr_1fr] gap-2 text-xs font-mono py-1 border-b border-slate-100 dark:border-slate-800 last:border-b-0; }
    .audit-diff-from   { @apply bg-rose-50 dark:bg-rose-950/40 text-rose-700 dark:text-rose-300 px-2 py-0.5 rounded; }
    .audit-diff-to     { @apply bg-emerald-50 dark:bg-emerald-950/40 text-emerald-700 dark:text-emerald-300 px-2 py-0.5 rounded; }

    /* === MISC =============================================== */

    .dropzone.dragover { @apply ring-2 ring-indigo-500 bg-indigo-50 dark:bg-indigo-950/50; }

    /* Sticky header у длинных страниц (используется опционально) */
    .sticky-header     { @apply sticky top-0 z-10 bg-slate-50/80 dark:bg-slate-950/80 backdrop-blur-sm; }
  </style>
</head>
<body class="font-sans antialiased bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">

  <!-- ============================================================ -->
  <!-- LOGIN — full-screen когда нет токена                         -->
  <!-- ============================================================ -->
  <div id="login-screen" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-50 dark:bg-slate-950">
    <div class="card w-full max-w-md mx-4 p-8 shadow-xl">
      <div class="flex items-center gap-3 mb-6">
        <div class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center text-white">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6"><path d="M5.625 1.5c-1.036 0-1.875.84-1.875 1.875v17.25c0 1.035.84 1.875 1.875 1.875h12.75c1.035 0 1.875-.84 1.875-1.875V12.75A3.75 3.75 0 0 0 16.5 9h-1.875a1.875 1.875 0 0 1-1.875-1.875V5.25A3.75 3.75 0 0 0 9 1.5H5.625Z"/><path d="M12.971 1.816A5.23 5.23 0 0 1 14.25 5.25v1.875c0 .207.168.375.375.375H16.5a5.23 5.23 0 0 1 3.434 1.279 9.768 9.768 0 0 0-6.963-6.963Z"/></svg>
        </div>
        <div>
          <h1 class="text-lg font-semibold leading-tight">parsdocs</h1>
          <p class="text-sm text-slate-500 dark:text-slate-400">Document intelligence</p>
        </div>
      </div>

      <form id="login-form" class="space-y-4">
        <div class="form-row">
          <label class="form-label">API token</label>
          <input id="token-input" type="password" autocomplete="off" required
            class="form-input" placeholder="Вставь API_KEY из .env" />
          <p class="form-help">Сохраняется в браузере (localStorage). На сервер уходит только в Authorization-заголовке.</p>
        </div>
        <button type="submit" class="btn-primary btn-md w-full">Войти</button>
        <p id="login-error" class="hidden form-error"></p>
      </form>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- APP SHELL — sidebar + main, когда токен выставлен            -->
  <!-- ============================================================ -->
  <div id="app-shell" class="hidden h-screen flex">
    <aside class="w-60 shrink-0 flex flex-col bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800">
      <div class="px-5 py-5 flex items-center gap-2.5">
        <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center text-white shadow-sm shadow-indigo-500/30">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="m9 15 2 2 4-4"/></svg>
        </div>
        <div class="leading-tight">
          <div class="font-semibold">parsdocs</div>
          <div class="text-[10px] uppercase tracking-wider text-slate-400 dark:text-slate-500">document intelligence</div>
        </div>
      </div>

      <!-- Workspace switcher: текущий проект, выбирается из доступных пользователю.
           Persist в localStorage. На jobs list фильтрует автоматически. -->
      <div id="workspace-switcher" class="px-3 pb-3 hidden">
        <label class="text-[10px] uppercase tracking-wider text-slate-400 dark:text-slate-500 px-2 mb-1 block">Workspace</label>
        <select id="workspace-select" class="form-select text-xs"></select>
      </div>

      <nav class="px-3 py-2 space-y-0.5 flex-1">
        <a href="#dashboard"      data-nav="dashboard"      class="nav-link" title="Операционная сводка: статусы, latency, LLM-стоимость, throughput">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path d="M15.5 2A1.5 1.5 0 0 0 14 3.5v13a1.5 1.5 0 0 0 1.5 1.5h1a1.5 1.5 0 0 0 1.5-1.5v-13A1.5 1.5 0 0 0 16.5 2h-1ZM9.5 6A1.5 1.5 0 0 0 8 7.5v9A1.5 1.5 0 0 0 9.5 18h1a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 10.5 6h-1ZM3.5 10A1.5 1.5 0 0 0 2 11.5v5A1.5 1.5 0 0 0 3.5 18h1A1.5 1.5 0 0 0 6 16.5v-5A1.5 1.5 0 0 0 4.5 10h-1Z"/></svg>
          Dashboard
        </a>
        <a href="#jobs"           data-nav="jobs"           class="nav-link" title="Список загруженных документов и их статус">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path fill-rule="evenodd" d="M3 6.5A1.5 1.5 0 0 1 4.5 5h11A1.5 1.5 0 0 1 17 6.5v7a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 3 13.5v-7Zm2 0v7h10v-7H5Z" clip-rule="evenodd"/></svg>
          Jobs
        </a>
        <a href="#upload"         data-nav="upload"         class="nav-link" title="Загрузить один или несколько документов">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path fill-rule="evenodd" d="M10 1a.75.75 0 0 1 .75.75v9.69l1.95-2.1a.75.75 0 1 1 1.1 1.02l-3.25 3.5a.75.75 0 0 1-1.1 0l-3.25-3.5a.75.75 0 1 1 1.1-1.02l1.95 2.1V1.75A.75.75 0 0 1 10 1ZM4 14.5a.75.75 0 0 1 .75.75V17h10.5v-1.75a.75.75 0 0 1 1.5 0v2A.75.75 0 0 1 16 18H4a.75.75 0 0 1-.75-.75v-2A.75.75 0 0 1 4 14.5Z" clip-rule="evenodd"/></svg>
          Upload
        </a>
        <a href="#document-types" data-nav="document-types" class="nav-link" title="Типы документов: поля, инструкции для агента, валидаторы">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path d="M3 4.75A2.75 2.75 0 0 1 5.75 2h8.5A2.75 2.75 0 0 1 17 4.75v10.5A2.75 2.75 0 0 1 14.25 18h-8.5A2.75 2.75 0 0 1 3 15.25V4.75Zm3 .75a.75.75 0 0 0 0 1.5h8a.75.75 0 0 0 0-1.5H6ZM5.25 10A.75.75 0 0 1 6 9.25h8a.75.75 0 0 1 0 1.5H6a.75.75 0 0 1-.75-.75Zm0 3.5a.75.75 0 0 1 .75-.75h5a.75.75 0 0 1 0 1.5H6a.75.75 0 0 1-.75-.75Z"/></svg>
          Document types
        </a>
        <a href="#providers"      data-nav="providers"      class="nav-link" title="API-ключи LLM и OCR провайдеров">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path fill-rule="evenodd" d="M8 1a.75.75 0 0 1 .75.75V6h2.5V1.75a.75.75 0 0 1 1.5 0V6h.75A2.75 2.75 0 0 1 16.25 8.75v1.378c.92.428 1.5 1.36 1.5 2.372V14.5a3.5 3.5 0 0 1-7 0v-1.998c0-1.012.58-1.944 1.5-2.372V8.75A1.25 1.25 0 0 0 11 7.5H4.5a.75.75 0 0 1 0-1.5h.25V1.75A.75.75 0 0 1 5.5 1h1.75v5h.75V1.75A.75.75 0 0 1 8 1Z" clip-rule="evenodd"/></svg>
          Providers
        </a>
        <a href="#audit-log"      data-nav="audit-log"      class="nav-link" title="История админ-изменений">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm.75-13a.75.75 0 0 0-1.5 0v5c0 .414.336.75.75.75h4a.75.75 0 0 0 0-1.5h-3.25V5Z" clip-rule="evenodd"/></svg>
          Audit log
        </a>
        <a href="#tenants"        data-nav="tenants"        class="nav-link" title="Организации, проекты, пользователи">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path d="M7 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM14.5 9a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5ZM1.615 16.428a1.224 1.224 0 0 1-.569-1.175 6.002 6.002 0 0 1 11.908 0c.058.467-.172.92-.57 1.174A9.953 9.953 0 0 1 7 18a9.953 9.953 0 0 1-5.385-1.572ZM14.5 16h-.106c.07-.297.088-.611.048-.933a7.47 7.47 0 0 0-1.588-3.755 4.502 4.502 0 0 1 5.874 2.636.818.818 0 0 1-.36.98A7.465 7.465 0 0 1 14.5 16Z"/></svg>
          Tenants
