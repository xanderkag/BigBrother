<!DOCTYPE html>
<html lang="ru" class="">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>parsdocs</title>
  <!-- Inline SVG favicon — индиго-документ с уголком. Без отдельного файла. -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%234f46e5'><path d='M5.625 1.5c-1.036 0-1.875.84-1.875 1.875v17.25c0 1.035.84 1.875 1.875 1.875h12.75c1.035 0 1.875-.84 1.875-1.875V12.75A3.75 3.75 0 0 0 16.5 9h-1.875a1.875 1.875 0 0 1-1.875-1.875V5.25A3.75 3.75 0 0 0 9 1.5H5.625Z'/><path d='M12.971 1.816A5.23 5.23 0 0 1 14.25 5.25v1.875c0 .207.168.375.375.375H16.5a5.23 5.23 0 0 1 3.434 1.279 9.768 9.768 0 0 0-6.963-6.963Z'/></svg>" />

  <!-- Self-hosted Tailwind + Alpine. Все стили и токены precompile'ены в
       vendor/tailwind.css из web/input.css (см. npm run build:css).
       Раньше использовался Play CDN, но cdn.tailwindcss.com блокируется
       в корпоративных сетях — переехали на self-host. -->
  <link rel="stylesheet" href="/ui/vendor/tailwind.css">
  <script defer src="/ui/vendor/alpine.min.js"></script>

  <!--
    Шрифты: используем системный стек (Segoe UI / SF / Roboto на mobile).
    Google Fonts блокирован в корп.сети, а Inter/JetBrains Mono как
    .woff2 self-host'ом ~300 KB — пока не критично.
  -->
  <!-- Все стили перенесены в web/input.css → web/vendor/tailwind.css.
       Этот <style> блок намеренно оставлен пустым — здесь можно
       добавлять ad-hoc стили для одной страницы без полного rebuild. -->
  <style>
  </style>
</head>
<body class="font-sans antialiased bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">

  <!-- ============================================================ -->
  <!-- LOGIN — full-screen когда нет токена                         -->
  <!-- ============================================================ -->
  <div id="login-screen" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-50 dark:bg-slate-950">
    <div class="card w-full max-w-md mx-4 p-8 shadow-xl">
      <div class="flex items-center gap-3 mb-6">
        <div class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center text-white">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6"><path d="M5.625 1.5c-1.036 0-1.875.84-1.875 1.875v17.25c0 1.035.84 1.875 1.875 1.875h12.75c1.035 0 1.875-.84 1.875-1.875V12.75A3.75 3.75 0 0 0 16.5 9h-1.875a1.875 1.875 0 0 1-1.875-1.875V5.25A3.75 3.75 0 0 0 9 1.5H5.625Z"/><path d="M12.971 1.816A5.23 5.23 0 0 1 14.25 5.25v1.875c0 .207.168.375.375.375H16.5a5.23 5.23 0 0 1 3.434 1.279 9.768 9.768 0 0 0-6.963-6.963Z"/></svg>
        </div>
        <div>
          <h1 class="text-lg font-semibold leading-tight">parsdocs</h1>
          <p class="text-sm text-slate-500 dark:text-slate-400">Document intelligence</p>
        </div>
      </div>

      <form id="login-form" class="space-y-4">
        <div class="form-row">
          <label class="form-label">API token</label>
          <input id="token-input" type="password" autocomplete="off" required
            class="form-input" placeholder="Вставь API_KEY из .env" />
          <p class="form-help">Сохраняется в браузере (localStorage). На сервер уходит только в Authorization-заголовке.</p>
        </div>
        <button type="submit" class="btn-primary btn-md w-full">Войти</button>
        <p id="login-error" class="hidden form-error"></p>
      </form>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- APP SHELL — sidebar + main, когда токен выставлен            -->
  <!-- ============================================================ -->
  <div id="app-shell" class="hidden h-screen flex">
    <aside class="w-60 shrink-0 flex flex-col bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800">
      <div class="px-5 py-5 flex items-center gap-2.5">
        <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center text-white shadow-sm shadow-indigo-500/30">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="m9 15 2 2 4-4"/></svg>
        </div>
        <div class="leading-tight">
          <div class="font-semibold">parsdocs</div>
          <div class="text-[10px] uppercase tracking-wider text-slate-400 dark:text-slate-500">document intelligence</div>
        </div>
      </div>

      <!-- Workspace switcher: текущий проект, выбирается из доступных пользователю.
           Persist в localStorage. На jobs list фильтрует автоматически. -->
      <div id="workspace-switcher" class="px-3 pb-3 hidden">
        <label class="text-[10px] uppercase tracking-wider text-slate-400 dark:text-slate-500 px-2 mb-1 block">Workspace</label>
        <select id="workspace-select" class="form-select text-xs"></select>
      </div>

      <nav class="px-3 py-2 space-y-0.5 flex-1">
        <a href="#dashboard"      data-nav="dashboard"      class="nav-link" title="Операционная сводка: статусы, latency, LLM-стоимость, throughput">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path d="M15.5 2A1.5 1.5 0 0 0 14 3.5v13a1.5 1.5 0 0 0 1.5 1.5h1a1.5 1.5 0 0 0 1.5-1.5v-13A1.5 1.5 0 0 0 16.5 2h-1ZM9.5 6A1.5 1.5 0 0 0 8 7.5v9A1.5 1.5 0 0 0 9.5 18h1a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 10.5 6h-1ZM3.5 10A1.5 1.5 0 0 0 2 11.5v5A1.5 1.5 0 0 0 3.5 18h1A1.5 1.5 0 0 0 6 16.5v-5A1.5 1.5 0 0 0 4.5 10h-1Z"/></svg>
          Dashboard
        </a>
        <a href="#jobs"           data-nav="jobs"           class="nav-link" title="Список загруженных документов и их статус">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path fill-rule="evenodd" d="M3 6.5A1.5 1.5 0 0 1 4.5 5h11A1.5 1.5 0 0 1 17 6.5v7a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 3 13.5v-7Zm2 0v7h10v-7H5Z" clip-rule="evenodd"/></svg>
          Jobs
        </a>
        <a href="#review"         data-nav="review"         class="nav-link" title="Очередь needs_review: одобрить или скорректировать">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4 text-amber-500"><path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495ZM10 5a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 10 5Zm0 9a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd"/></svg>
          Review
        </a>
        <a href="#upload"         data-nav="upload"         class="nav-link" title="Загрузить один или несколько документов">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path fill-rule="evenodd" d="M10 1a.75.75 0 0 1 .75.75v9.69l1.95-2.1a.75.75 0 1 1 1.1 1.02l-3.25 3.5a.75.75 0 0 1-1.1 0l-3.25-3.5a.75.75 0 1 1 1.1-1.02l1.95 2.1V1.75A.75.75 0 0 1 10 1ZM4 14.5a.75.75 0 0 1 .75.75V17h10.5v-1.75a.75.75 0 0 1 1.5 0v2A.75.75 0 0 1 16 18H4a.75.75 0 0 1-.75-.75v-2A.75.75 0 0 1 4 14.5Z" clip-rule="evenodd"/></svg>
          Upload
        </a>
        <a href="#test-lab" data-nav="test-lab" id="nav-test-lab" class="nav-link hidden" title="Тестовая лаборатория: прогон через конкретные модели, сравнение, калибровка">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path fill-rule="evenodd" d="M7.25 1.75a.75.75 0 0 0 0 1.5h.5v6.793l-2.97 2.97A1.75 1.75 0 0 0 6.018 16h7.964a1.75 1.75 0 0 0 1.238-2.987l-2.97-2.97V3.25h.5a.75.75 0 0 0 0-1.5h-5.5ZM9.25 3.25v7.104a.75.75 0 0 1-.22.53L6.06 13.854a.25.25 0 0 0 .177.427h7.526a.25.25 0 0 0 .177-.427L11 10.884a.75.75 0 0 1-.22-.53V3.25h-1.53Z" clip-rule="evenodd"/></svg>
          Тестовая лаборатория
        </a>
        <a href="#document-types" data-nav="document-types" class="nav-link" title="Типы документов: поля, инструкции для агента, валидаторы">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path d="M3 4.75A2.75 2.75 0 0 1 5.75 2h8.5A2.75 2.75 0 0 1 17 4.75v10.5A2.75 2.75 0 0 1 14.25 18h-8.5A2.75 2.75 0 0 1 3 15.25V4.75Zm3 .75a.75.75 0 0 0 0 1.5h8a.75.75 0 0 0 0-1.5H6ZM5.25 10A.75.75 0 0 1 6 9.25h8a.75.75 0 0 1 0 1.5H6a.75.75 0 0 1-.75-.75Zm0 3.5a.75.75 0 0 1 .75-.75h5a.75.75 0 0 1 0 1.5H6a.75.75 0 0 1-.75-.75Z"/></svg>
          Document types
        </a>
        <a href="#providers"      data-nav="providers"      class="nav-link" title="API-ключи LLM и OCR провайдеров">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path fill-rule="evenodd" d="M8 1a.75.75 0 0 1 .75.75V6h2.5V1.75a.75.75 0 0 1 1.5 0V6h.75A2.75 2.75 0 0 1 16.25 8.75v1.378c.92.428 1.5 1.36 1.5 2.372V14.5a3.5 3.5 0 0 1-7 0v-1.998c0-1.012.58-1.944 1.5-2.372V8.75A1.25 1.25 0 0 0 11 7.5H4.5a.75.75 0 0 1 0-1.5h.25V1.75A.75.75 0 0 1 5.5 1h1.75v5h.75V1.75A.75.75 0 0 1 8 1Z" clip-rule="evenodd"/></svg>
          Providers
        </a>
        <a href="#audit-log"      data-nav="audit-log"      class="nav-link" title="История админ-изменений">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm.75-13a.75.75 0 0 0-1.5 0v5c0 .414.336.75.75.75h4a.75.75 0 0 0 0-1.5h-3.25V5Z" clip-rule="evenodd"/></svg>
          Audit log
        </a>
        <a href="#tenants"        data-nav="tenants"        class="nav-link" title="Организации, проекты, пользователи">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path d="M7 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM14.5 9a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5ZM1.615 16.428a1.224 1.224 0 0 1-.569-1.175 6.002 6.002 0 0 1 11.908 0c.058.467-.172.92-.57 1.174A9.953 9.953 0 0 1 7 18a9.953 9.953 0 0 1-5.385-1.572ZM14.5 16h-.106c.07-.297.088-.611.048-.933a7.47 7.47 0 0 0-1.588-3.755 4.502 4.502 0 0 1 5.874 2.636.818.818 0 0 1-.36.98A7.465 7.465 0 0 1 14.5 16Z"/></svg>
          Tenants
        </a>
        <a href="#reference-lists" data-nav="reference-lists" class="nav-link" title="Справочники для привязки документов (ГЕ, номенклатура, …)">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path fill-rule="evenodd" d="M6 4.75A.75.75 0 0 1 6.75 4h10.5a.75.75 0 0 1 0 1.5H6.75A.75.75 0 0 1 6 4.75ZM6 10a.75.75 0 0 1 .75-.75h10.5a.75.75 0 0 1 0 1.5H6.75A.75.75 0 0 1 6 10Zm0 5.25a.75.75 0 0 1 .75-.75h10.5a.75.75 0 0 1 0 1.5H6.75a.75.75 0 0 1-.75-.75ZM1.99 4.75a1 1 0 0 1 1-1H3a1 1 0 0 1 1 1v.01a1 1 0 0 1-1 1h-.01a1 1 0 0 1-1-1v-.01ZM1.99 15.25a1 1 0 0 1 1-1H3a1 1 0 0 1 1 1v.01a1 1 0 0 1-1 1h-.01a1 1 0 0 1-1-1v-.01ZM1.99 10a1 1 0 0 1 1-1H3a1 1 0 0 1 1 1v.01a1 1 0 0 1-1 1h-.01a1 1 0 0 1-1-1V10Z" clip-rule="evenodd"/></svg>
          Reference lists
        </a>
        <a href="#settings"       data-nav="settings"       class="nav-link" title="Конфигурация сервиса и пробники">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path fill-rule="evenodd" d="M7.84 1.804A1 1 0 0 1 8.82 1h2.36a1 1 0 0 1 .98.804l.331 1.652a6.993 6.993 0 0 1 1.929 1.115l1.598-.54a1 1 0 0 1 1.186.447l1.18 2.044a1 1 0 0 1-.205 1.251l-1.267 1.113a7.047 7.047 0 0 1 0 2.228l1.267 1.113a1 1 0 0 1 .206 1.25l-1.18 2.045a1 1 0 0 1-1.187.447l-1.598-.54a6.993 6.993 0 0 1-1.929 1.115l-.33 1.652a1 1 0 0 1-.98.804H8.82a1 1 0 0 1-.98-.804l-.331-1.652a6.993 6.993 0 0 1-1.929-1.115l-1.598.54a1 1 0 0 1-1.186-.447l-1.18-2.044a1 1 0 0 1 .205-1.251l1.267-1.114a7.05 7.05 0 0 1 0-2.227L1.821 7.773a1 1 0 0 1-.206-1.25l1.18-2.045a1 1 0 0 1 1.187-.447l1.598.54A6.992 6.992 0 0 1 7.51 3.456l.33-1.652ZM10 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" clip-rule="evenodd"/></svg>
          Settings
        </a>
      </nav>

      <div class="border-t border-slate-200 dark:border-slate-800 px-3 py-3 flex items-center justify-between gap-2">
        <button id="dark-toggle" title="Theme" class="btn-ghost btn-sm">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4 hidden dark:block"><path d="M10 2a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 10 2ZM10 15a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 10 15ZM10 7a3 3 0 1 0 0 6 3 3 0 0 0 0-6ZM15.657 5.404a.75.75 0 0 0-1.06-1.06l-1.062 1.06a.75.75 0 0 0 1.06 1.06l1.061-1.06ZM6.464 14.596a.75.75 0 0 0-1.06-1.06l-1.06 1.06a.75.75 0 0 0 1.06 1.06l1.06-1.06ZM18 10a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 18 10ZM5 10a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 5 10ZM14.596 15.657a.75.75 0 0 0 1.06-1.06l-1.06-1.062a.75.75 0 1 0-1.06 1.06l1.06 1.062ZM5.404 6.464a.75.75 0 0 0 1.06-1.06l-1.06-1.06a.75.75 0 0 0-1.06 1.06l1.06 1.06Z"/></svg>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4 dark:hidden"><path fill-rule="evenodd" d="M7.455 2.004a.75.75 0 0 1 .26.77 7 7 0 0 0 9.958 7.967.75.75 0 0 1 1.067.853A8.5 8.5 0 1 1 6.647 1.921a.75.75 0 0 1 .808.083Z" clip-rule="evenodd"/></svg>
          <span>Theme</span>
        </button>
        <button id="logout-btn" class="btn-ghost btn-sm">Logout</button>
      </div>
    </aside>

    <main id="view" class="flex-1 overflow-y-auto"></main>
  </div>

  <script type="module" src="/ui/app.js"></script>
</body>
</html>
