# parsdocs ↔ consumer webhook contract — OpenAPI 3.1
#
# Closes TECH_DEBT.md F3 item 4. Companion document to:
#   - doc-service/src/webhooks/deliver.ts  (payload + headers source-of-truth)
#   - doc-service/docs/PARSDOCS_REPLY_TO_SLAI_TZ.md  (versioning policy)
#   - doc-service/docs/PARSDOCS_Q7_MATCHER_REVIEW.md (HMAC verify guidance)
#
# Audience: SLAI integrators (and any other downstream receiver). The
# spec describes the **outbound webhook** we POST to the receiver's
# `webhook_url` when a job reaches a terminal status (`done`, `failed`,
# or `needs_review`). The receiver is expected to implement one HTTP
# endpoint matching this contract.
#
# Versioning policy (per PARSDOCS_REPLY_TO_SLAI_TZ.md):
#   - Adding optional fields = backwards-compatible, stays on v1.
#   - Renaming / removing fields = breaking, bumps to v2 with ≥6 months
#     parallel delivery (caller subscribes to one version).
#   - Current contract version is always echoed in payload.version.

openapi: 3.1.0

info:
  title: parsdocs Webhook Contract
  version: "1.0.0"
  summary: Outbound webhook payload delivered to consumer-supplied `webhook_url`.
  description: |
    When a job created via `POST /api/v1/jobs` reaches a terminal status,
    parsdocs delivers a single HTTP POST to the `webhook_url` provided at
    job-creation time. This document specifies the request shape (headers
    + JSON body) and the receiver's expected response semantics.

    ## Delivery semantics

    - **Retries.** Up to `WEBHOOK_MAX_ATTEMPTS` (default 5) with
      exponential backoff capped at 60 s. 2xx stops retries. 4xx (except
      408 / 429) is treated as a permanent client error and stops retries
      too — fix the receiver, then call `POST /api/v1/jobs/{id}/redeliver`
      to retry manually. 5xx / 408 / 429 / network errors retry until
      attempts are exhausted.
    - **Idempotency.** The receiver MUST be idempotent on `job_id`. A
      single job can produce multiple delivery attempts (and rarely a
      duplicate successful delivery if our ack times out).
    - **Ordering.** Not guaranteed. A `redeliver` call can arrive after
      a newer job for the same source document.
    - **Latency.** First attempt is dispatched within seconds of the job
      reaching terminal status.

    ## HMAC signature

    The receiver MUST verify the `x-parsdocs-signature` header using the
    shared secret (`PARSDOCS_TO_SLAI_HMAC_SECRET` for the SLAI ↔ parsdocs
    pair; one secret per consumer). Compute HMAC-SHA256 over the raw
    request body bytes and compare with `crypto.timingSafeEqual` (or the
    equivalent constant-time compare in your language). The legacy
    `x-docservice-signature` header is duplicated for migration; new
    receivers should use `x-parsdocs-*` exclusively.

    ## Versioning

    `payload.version` is always `"v1"`. A future breaking change will
    bump it to `"v2"` and run in parallel for ≥6 months — receivers
    SHOULD reject unknown versions with HTTP 400, not silently coerce.

servers:
  - url: https://{consumer_host}
    description: Consumer-controlled receiver
    variables:
      consumer_host:
        default: example.consumer.tld
        description: The host hosting the `webhook_url` registered with parsdocs.

tags:
  - name: webhook
    description: Outbound delivery — parsdocs → consumer.

paths:

  /any/path/the/consumer/registered:
    post:
      tags: [webhook]
      operationId: receiveJobCallback
      summary: Receive a parsdocs job-terminal callback.
      description: |
        The actual path is whatever the consumer registered as
        `webhook_url` when creating the job (`POST /api/v1/jobs`). The
        path is opaque to parsdocs; only the host + headers + JSON body
        defined here are part of the contract.
      parameters:
        # Preferred (since EXT-A 2026-05-26) — extractor-agnostic alias.
        - $ref: "#/components/parameters/ExtractorSignature"
        - $ref: "#/components/parameters/ExtractorJobId"
        - $ref: "#/components/parameters/ExtractorAttempt"
        # Same payload, parsdocs-namespaced (still preferred for current consumers).
        - $ref: "#/components/parameters/Signature"
        - $ref: "#/components/parameters/JobId"
        - $ref: "#/components/parameters/Attempt"
        # Legacy back-compat — pre-2026-05-18 header names. Remove in v2.
        - $ref: "#/components/parameters/LegacySignature"
        - $ref: "#/components/parameters/LegacyJobId"
        - $ref: "#/components/parameters/LegacyAttempt"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
            examples:
              singleDocInvoiceDone:
                $ref: "#/components/examples/SingleDocInvoiceDone"
              singleDocNeedsReview:
                $ref: "#/components/examples/SingleDocNeedsReview"
              multiDocBundle:
                $ref: "#/components/examples/MultiDocBundle"
              failed:
                $ref: "#/components/examples/Failed"
      responses:
        "200":
          description: Accepted. Parsdocs marks the job as delivered and stops retrying.
        "204":
          description: Accepted with no body. Same effect as 200.
        "400":
          description: |
            Permanent client error — the receiver rejects the payload
            (validation failure, signature mismatch, etc.). Parsdocs
            stops retrying. The receiver SHOULD log enough context to
            reproduce; parsdocs surfaces the first 500 chars of the
            response body in `jobs.webhook_attempts[].error`.
        "408":
          description: Timeout. Retried with backoff.
        "429":
          description: Rate-limited. Retried with backoff.
        "5XX":
          description: Server error. Retried with backoff.

components:

  parameters:

    Signature:
      name: x-parsdocs-signature
      in: header
      required: true
      description: |
        HMAC-SHA256 of the raw request body, hex-encoded, prefixed with
        `sha256=`. Verify with `crypto.timingSafeEqual` against
        `hmac_sha256(shared_secret, raw_body)`.
      schema:
        type: string
        pattern: "^sha256=[0-9a-f]{64}$"
        example: sha256=8f3b9a0c2d1e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a

    JobId:
      name: x-parsdocs-job-id
      in: header
      required: true
      description: UUID of the job. Mirrors `body.job_id`. Useful for log correlation.
      schema:
        type: string
        format: uuid

    Attempt:
      name: x-parsdocs-attempt
      in: header
      required: true
      description: |
        1-indexed attempt counter. Use for receiver-side dedup keys
        (e.g. `{job_id}:{attempt}` if you want to ack each attempt
        separately).
      schema:
        type: integer
        minimum: 1

    ExtractorSignature:
      name: x-extractor-signature
      in: header
      required: true
      description: |
        Extractor-agnostic alias (since 2026-05-26, EXT-A). Тот же HMAC что и
        `x-parsdocs-signature` — посылается одновременно ради consumer'ов
        нового `ExtractorGateway`, который не должен знать, какой адаптер
        внутри (parsdocs / другой extractor). Predпочтительный header для
        новых интеграций; `x-parsdocs-signature` оставлен для back-compat.
      schema:
        type: string
        pattern: "^sha256=[0-9a-f]{64}$"

    ExtractorJobId:
      name: x-extractor-job-id
      in: header
      required: true
      description: |
        Extractor-agnostic alias (since 2026-05-26). Тот же UUID что и
        `x-parsdocs-job-id`.
      schema:
        type: string
        format: uuid

    ExtractorAttempt:
      name: x-extractor-attempt
      in: header
      required: true
      description: |
        Extractor-agnostic alias (since 2026-05-26). Тот же counter что и
        `x-parsdocs-attempt`.
      schema:
        type: integer
        minimum: 1

    LegacySignature:
      name: x-docservice-signature
      in: header
      required: false
      deprecated: true
      description: |
        Pre-2026-05-18 header name. Duplicate of `x-parsdocs-signature`.
        New receivers MUST NOT depend on it; will be removed in v2.
      schema:
        type: string
        pattern: "^sha256=[0-9a-f]{64}$"

    LegacyJobId:
      name: x-docservice-job-id
      in: header
      required: false
      deprecated: true
      schema:
        type: string
        format: uuid

    LegacyAttempt:
      name: x-docservice-attempt
      in: header
      required: false
      deprecated: true
      schema:
        type: integer
        minimum: 1

  schemas:

    WebhookPayload:
      type: object
      description: |
        Source of truth: `WebhookPayload` in `src/webhooks/deliver.ts`.
        Optional fields may be absent (omitted entirely) or `null`;
        receivers MUST treat both the same way.
      required:
        - version
        - schema_version
        - job_id
        - status
        - document_type
        - confidence
        - ocr_engine
        - file_sha256
        - extracted
        - metadata
        - error
      properties:
        version:
          type: string
          enum: [v1]
          description: |
            Contract version (envelope). Always `"v1"` today. Receivers
            SHOULD reject unknown values with HTTP 400. NOT bumped when
            only the `extracted` field-set drifts — see `schema_version`.
        schema_version:
          type: string
          example: "1.2"
          description: |
            Drift marker for the payload field-set, independent of the
            envelope `version`. Semver `MAJOR.MINOR` string, currently
            `"1.2"` (1.1 → 1.2, 2026-07-02: added top-level `file_sha256`;
            1.0 → 1.1, 2026-07-01: `document_type` may now carry the literal
            `"unknown"` for docs the classifier could not assign a type).
            Bumped when fields are added/changed; `version` stays `"v1"`.
            Distinct from `extracted._match_signals.schema_version` (which
            scopes only the match-signals projection).
        job_id:
          type: string
          format: uuid
          description: Stable parsdocs identifier for this processing run.
        status:
          $ref: "#/components/schemas/JobStatus"
        document_type:
          oneOf:
            - $ref: "#/components/schemas/DocumentType"
            - type: "null"
          description: |
            Recognized document type slug in outbound (lowercase
            snake_case) form. The literal `"unknown"` (schema_version
            1.1, 2026-07-01) means the classifier could not assign a type
            — the explicit signal for an unrecognized document (typically
            paired with `status: needs_review`), replacing the older
            `null` + `unrecognized` flag representation. `null` may still
            appear for jobs that failed before classification.
        confidence:
          oneOf:
            - type: number
              minimum: 0
              maximum: 1
            - type: "null"
          description: |
            Aggregate confidence (OCR × classifier × parser). `null` if
            the job failed before a confidence was computed.
        ocr_engine:
          oneOf:
            - $ref: "#/components/schemas/OcrEngine"
            - type: "null"
          description: Which OCR engine produced the text used downstream.
        file_sha256:
          oneOf:
            - type: string
              pattern: "^[0-9a-f]{64}$"
            - type: "null"
          description: |
            SHA256 of the original uploaded file (lowercase hex, 64 chars).
            Added in schema_version 1.2 (2026-07-02) for consumer-side
            deduplication. `null` for legacy jobs ingested before the hash
            column existed.
        extracted:
          oneOf:
            - $ref: "#/components/schemas/Extracted"
            - type: "null"
          description: |
            Document-type-specific extracted JSON. Shape depends on
            `document_type` — see `Extracted` schemas. For a multi-doc
            bundle, this is the **dominant** document (largest segment);
            the full set is in `documents[]`.
        metadata:
          oneOf:
            - type: object
              additionalProperties: true
            - type: "null"
          description: |
            Echo of the consumer-supplied `metadata` from job creation.
            **Sanitized**: keys/values matching known secret patterns
            (`password`, `sk-ant-…`, `AKIA…`, etc.) are replaced with
            `[REDACTED: …]` before delivery. See `storage/metadata-sanitizer.ts`.

            If the job was created with `metadata.redact_pii: true`,
            PII fields (ИНН, KPP, ФИО, phone, email, plate, address)
            are stripped from both `metadata` and `extracted` before
            delivery; the unredacted form remains in our DB for audit.
        error:
          oneOf:
            - type: string
            - type: "null"
          description: |
            Human-readable error message for `status: failed`. `null`
            otherwise. Codes (`PASSWORD_REQUIRED`, `CORRUPTED`,
            `EMPTY_PDF`, `OCR_REFUSED`) are embedded in the message
            prefix when known.
        _field_confidence:
          type: object
          additionalProperties:
            type: number
            minimum: 0
            maximum: 1
          description: |
            Per-field calibrated confidence (F2). Keys are dot-paths
            into `extracted` (e.g. `seller.inn`, `positions.0.total`).
            Calibration: checksum-validated values (ИНН, KPP) snap to
            ~1.0; normalized values (vehicle plate, ISO dates) get a
            boost. Absent when no field-level confidence was produced.
        documents:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ExtractedDocumentEntry"
          description: |
            Multi-document bundle (F5). Present **only** when the source
            file contained more than one document of distinct types
            (e.g. invoice + TTN + АКТ stitched into a single PDF, or an
            XLSX with multiple sheets). For a single-document job the
            field is absent — read `extracted` instead.

            Receivers integrating multi-doc SHOULD prefer `documents[]`
            when present and treat `extracted` as a "primary" pointer
            (it equals `documents[0].extracted` when the array is
            ordered by segment size).

    JobStatus:
      type: string
      enum: [done, failed, needs_review]
      description: |
        Terminal status. `pending` / `processing` never appear in a
        webhook (those are pre-terminal). `done` = high-confidence,
        no validation issues, ready for downstream auto-ingest.
        `needs_review` = confidence below per-type threshold or
        validation issues present — operator action expected.
        `failed` = unrecoverable error; `error` is populated.

    DocumentType:
      type: string
      description: |
        Outbound slug in lowercase snake_case. The built-in surface
        is enumerated below; **custom** types created via
        `POST /api/v1/document-types` ship their own slug (any
        lowercase snake_case string). Receivers SHOULD tolerate
        unknown slugs and route to a generic handler.

        The reserved literal `"unknown"` (schema_version 1.1) is not a
        catalog type — it marks a document the classifier could not
        assign a type to (unrecognized). Receivers SHOULD hold it for
        manual/review, not fail.

        Outbound aliasing happens at delivery time
        (`normalizeSlugForApi`):

        | DB slug       | Outbound slug      |
        |---------------|--------------------|
        | `TTN`         | `ttn`              |
        | `UPD`         | `upd`              |
        | `CMR`         | `cmr`              |
        | `AKT`         | `services_act`     |
        | `factInvoice` | `tax_invoice`      |
        | `invoice`     | `invoice`          |
      examples:
        - invoice
        - tax_invoice
        - upd
        - ttn
        - cmr
        - services_act
        - waybill
        - transport_request
        - transport_invoice
        - payment_order

    OcrEngine:
      type: string
      enum:
        - pdf-text
        - tesseract
        - vision-llm
        - yandex
        - xlsx
        - docx
        - doc
        - xml
        - transcribe
      description: |
        Which engine produced the text used for classification and
        extraction. `pdf-text` is the cheapest fast-path for PDFs with
        a text layer; `tesseract` covers scans; `vision-llm` is the
        Qwen-VL / Claude vision fallback when text-extraction quality
        is low. `yandex` is currently disabled in production (152-ФЗ
        risk) — listed for forward compatibility only. `xlsx`/`docx`/`doc`/`xml`
        are exact text-readers for those container formats (no OCR/vision):
        `doc` reads legacy Word 97-2003 (.doc) via catdoc; `xml` flattens
        electronic documents (ЭД, customs declarations) into
        readable `path/element: value` lines. `transcribe` is the ASR
        (speech-to-text) path: for audio uploads the transcript replaces
        OCR text and feeds the same downstream pipeline. Only produced
        when the voice/ASR path is enabled (ASR_ENABLED).

    Extracted:
      oneOf:
        - $ref: "#/components/schemas/InvoiceExtracted"
        - $ref: "#/components/schemas/TtnExtracted"
        - $ref: "#/components/schemas/CmrExtracted"
        - $ref: "#/components/schemas/AktExtracted"
        - $ref: "#/components/schemas/GenericExtracted"
      description: |
        Document-type-specific shape. Built-in types have a typed
        schema (below). Custom types ship `GenericExtracted` — an
        open object whose keys are configured per-type in the
        Document Type Registry.

        `_issues` may appear inside any `extracted` object: an array
        of human-readable validation messages (e.g. `"ИНН checksum
        mismatch"`, `"vat != total × rate / (100+rate) tolerance 0.5%"`).
        Presence of `_issues` typically pairs with `status:
        needs_review`. `_issues` is a **reserved key**; receivers
        should not store it in business tables — it's a UI hint.

        `_match_signals` (additive, since 2026-06-12, PD-CONTRACT-1
        §2.1): a canonical **flat** projection of cross-type matching
        keys (container numbers, bl/ttn/cmr numbers, parties, vehicle,
        dates, totals) so consumers get stable keys without digging
        into per-type nested fields. Present-only — a key is omitted
        when the document has no value (never `""`/`[]`/`null`).
        `schema_version` (now `"1.1"`) and `document_stage` are always
        present (`document_stage` defaults to `final`). See `MatchSignals`.
        This is a **reserved key** and a v1-compatible addition (existing
        per-type fields unchanged).

    MatchSignals:
      type: object
      description: |
        Canonical flat match-signals (PD-CONTRACT-1 §2.1). Lives at
        `extracted._match_signals`. Present-only: keys appear only when
        the document carries a value. Built declaratively per
        `document_type` with a generic fallback for unknown types
        (`src/pipeline/normalize/match-signals.ts`).
      required: [schema_version, document_stage]
      properties:
        schema_version:
          type: string
          enum: ["1.1"]
          description: |
            Always present. Bumped to `"1.1"` (2026-07-02) with the
            addition of `document_stage`/`release_type`/`bl_type`/
            `master_bl_number`/`number_of_original_bls`.
        document_stage:
          type: string
          enum: [draft, proforma, final]
          description: |
            Document stage. **Always present** (the one exception to
            present-only besides `schema_version`). `proforma` for
            proforma invoices; `draft` when an explicit draft marker is
            found; otherwise `final`. SLAI treats an omitted stage as
            `final` — we always emit it to remove ambiguity.
        release_type:
          type: string
          enum: [original, telex_release, seaway_waybill, surrendered]
          description: |
            B/L release state (bill_of_lading only, present-only). Set
            from an explicit marker; inferred `original` when
            `number_of_original_bls >= 1`. Never guessed as telex when
            unknown.
        bl_type:
          type: string
          enum: [Master, House, "Sea Waybill"]
          description: B/L type (bill_of_lading only, present-only).
        master_bl_number:
          type: string
          description: |
            Master B/L number for a House B/L (bill_of_lading only,
            present-only). Omitted on a Master B/L (no parent).
        number_of_original_bls:
          type: integer
          description: Number of original B/Ls issued (bill_of_lading only, present-only).
        containers:
          type: array
          items:
            type: string
          description: All ISO-6346 container numbers (4 letters + 7 digits).
        bl_number:
          type: string
        cmr_number:
          type: string
        ttn_number:
          type: string
        awb_number:
          type: string
        declaration_numbers:
          type: array
          items:
            type: string
        order_refs:
          type: array
          items:
            type: string
          description: |
            Order/PO/«Заказ №»/«Order Ref» numbers, as-is. Sourced from
            real schema fields (`order_ref`, `items[].order_ref`).
            Absent when no order-reference field exists for the type
            (not fabricated — see SLAI Q2).
        vehicle:
          type: object
          properties:
            plate:
              type: string
              description: Normalized RU plate (latin→cyrillic) or raw if not normalizable.
            trailer:
              type: string
        parties:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Party"
          description: |
            Canonical roles: `shipper`, `consignee`, `buyer`, `seller`,
            `carrier`, `forwarder`, `notify_party`, `payer`, `payee`.
            Each value is a present-only `{name, inn?, kpp?}`.
        dates:
          type: object
          additionalProperties:
            type: string
          description: "Canonical dates, e.g. `document`, `shipped_on_board`."
        totals:
          type: object
          properties:
            amount:
              type: number
            currency:
              type: string
            vat:
              type: number
        _confidence:
          type: object
          additionalProperties:
            type: number
            minimum: 0
            maximum: 1
          description: |
            §2.3 per-canonical-key confidence, sourced from the
            underlying source fields' `_field_confidence`. Keyed by
            canonical signal (`bl_number`, `containers`, `vehicle.plate`,
            `totals.amount`, `parties.<role>`, `dates.document`). Absent
            when no field-level confidence was produced.

    Party:
      type: object
      description: Counterparty (seller / buyer / shipper / consignee / etc.).
      properties:
        name:
          type: string
        inn:
          type: string
          description: |
            Russian ИНН — 10 digits (legal entity) or 12 digits
            (individual entrepreneur). Checksum-validated; high
            `_field_confidence` if it passed.
        kpp:
          type: string
          description: "9 chars, format NNNNCCNNN."
        address:
          type: string
        bank:
          type: string
          description: Bank name (F19, invoice schema only).
        bik:
          type: string
          description: 9-digit BIK code (F19).
        account:
          type: string
          description: 20-digit account number (F19).
        country:
          type: string
          description: ISO 3166-1 alpha-2 (used by CMR sender/recipient).

    InvoicePosition:
      type: object
      description: |
        Одна строка items[]. Базовые товарные поля + транспортные сигналы
        для счетов перевозчиков (EXT-LINE 2026-05-29). Все опциональные,
        nullable если в строке физически отсутствуют.
        parsdocs НЕ нормализует значения (upper-case / удаление пробелов
        / валидация форматов) — отдаёт как написано, consumer canonicalize'ит.
      properties:
        name:
          type: string
        qty:
          type: number
        price:
          type: number
        total:
          type: number
        vat:
          type: number
        # ── Транспортные сигналы (since 2026-05-20: vehicle_plate/order_ref/
        #    route_*/trip_date; since 2026-05-29: container_no/bl_no/cmr_no/
        #    ttn_no/declaration_no/driver_name).
        #    Доступность видна в GET /capabilities → supportedLineFields[].
        vehicle_plate:
          type: string
          description: "Госномер ТС (РФ-формат «А123ВС797» либо как в документе)."
        order_ref:
          type: string
          description: "Номер заказа/заявки на перевозку («Заказ:» / «Заявка:»)."
        route_from:
          type: string
          description: "Пункт отправления рейса (из «Маршрут: A → B»)."
        route_to:
          type: string
          description: "Пункт назначения рейса."
        trip_date:
          type: string
          format: date
          description: "Дата рейса этой строки (ISO YYYY-MM-DD)."
        container_no:
          type: string
          description: "Номер морского контейнера (ISO 6346 — 4 буквы + 7 цифр)."
        bl_no:
          type: string
          description: "Номер коносамента (Bill of Lading)."
        cmr_no:
          type: string
          description: "Номер CMR-накладной (международная авто)."
        ttn_no:
          type: string
          description: "Номер ТТН (товарно-транспортная накладная РФ)."
        declaration_no:
          type: string
          description: "Номер ДТ (таможенная декларация, для счетов брокеров)."
        driver_name:
          type: string
          description: "ФИО водителя как написано в строке."

    InvoiceExtracted:
      type: object
      description: |
        Source: `InvoiceExtractedSchema` in `src/types/documents.ts`.
        All fields optional — extractor reports what it found.
      properties:
        number:
          type: string
        date:
          type: string
          description: ISO 8601 date (YYYY-MM-DD) after normalization.
        seller:
          $ref: "#/components/schemas/Party"
        buyer:
          $ref: "#/components/schemas/Party"
        total:
          type: number
          description: Total amount including VAT. Validator enforces ∑positions.total ≈ total ±1%.
        vat:
          type: number
        vat_rate:
          type: number
          description: VAT rate as percent (e.g. `20`, `10`, `0`).
        # ── Document-level header-fallback (EXT-LINE 2026-05-29). Consumer
        #    использует когда у конкретной строки нет своих сигналов
        #    (например «счёт за май → плечо завершилось в мае»). parsdocs
        #    заполняет если в шапке есть, иначе поле отсутствует.
        period_from:
          type: string
          format: date
          description: "Дата начала периода оказания услуг (из «Период с … по …»)."
        period_to:
          type: string
          format: date
          description: "Дата конца периода оказания услуг."
        contract_no:
          type: string
          description: "Номер договора (из «по договору №», «на основании договора №»)."
        contract_date:
          type: string
          format: date
          description: "Дата договора."
        positions:
          type: array
          items:
            $ref: "#/components/schemas/InvoicePosition"
        _issues:
          type: array
          items:
            type: string

    TtnExtracted:
      type: object
      description: "ТТН (товарно-транспортная накладная). Source: `TtnExtractedSchema`."
      properties:
        number:
          type: string
        date:
          type: string
        shipper:
          $ref: "#/components/schemas/Party"
        consignee:
          $ref: "#/components/schemas/Party"
        cargo:
          type: object
          properties:
            name:
              type: string
            quantity:
              type: number
            weight_gross:
              type: number
            weight_nett:
              type: number
              description: Validator enforces nett ≤ gross.
            places:
              type: number
        vehicle:
          type: object
          properties:
            plate:
              type: string
              description: |
                Russian plate format `А123ВВ77` (Latin-lookalike Cyrillic
                only). Normalized to UPPERCASE. High `_field_confidence`
                on match.
            driver:
              type: string
        loading_point:
          type: string
        unloading_point:
          type: string
        _issues:
          type: array
          items:
            type: string

    CmrExtracted:
      type: object
      description: "CMR (международная транспортная). Source: `CmrExtractedSchema`."
      properties:
        number:
          type: string
        date:
          type: string
        sender:
          $ref: "#/components/schemas/Party"
        recipient:
          $ref: "#/components/schemas/Party"
        carrier:
          $ref: "#/components/schemas/Party"
        cargo:
          type: object
          properties:
            description:
              type: string
            packages:
              type: number
            weight:
              type: number
        loading_place:
          type: string
        delivery_place:
          type: string
        _issues:
          type: array
          items:
            type: string

    AktExtracted:
      type: object
      description: |
        Акт выполненных работ (slug `services_act` outbound). Source:
        `AktExtractedSchema`.
      properties:
        number:
          type: string
        date:
          type: string
        party_a:
          $ref: "#/components/schemas/Party"
        party_b:
          $ref: "#/components/schemas/Party"
        total:
          type: number
        vat:
          type: number
        services:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              qty:
                type: number
              price:
                type: number
        _issues:
          type: array
          items:
            type: string

    GenericExtracted:
      type: object
      additionalProperties: true
      description: |
        Custom document types (created via Document Type Registry)
        ship an open object whose schema is configured per-type by
        the operator. Receivers MUST tolerate unknown keys.

    ExtractedDocumentEntry:
      type: object
      description: |
        One entry in `documents[]` — a single document found inside
        a multi-doc source file. Source: `ExtractedDocumentEntry` in
        `src/pipeline/multidoc/types.ts`.
      required:
        - page_range
        - document_type
        - confidence
        - extracted
      properties:
        page_range:
          type: string
          description: |
            1-indexed page (or sheet) range. `"1"` for a single page,
            `"2-4"` for an inclusive range. MVP uses only these two
            forms; future versions may emit `"1,3-4"` for
            non-contiguous selection.
          examples:
            - "1"
            - "2-4"
        document_type:
          oneOf:
            - $ref: "#/components/schemas/DocumentType"
            - type: "null"
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: Page-segment classifier confidence (averaged over the pages of the segment).
        extracted:
          $ref: "#/components/schemas/Extracted"
        field_confidence:
          type: object
          additionalProperties:
            type: number
            minimum: 0
            maximum: 1
          description: |
            Per-field confidence for this segment. Mirrors the
            top-level `_field_confidence` but scoped to a single
            document inside the bundle.

